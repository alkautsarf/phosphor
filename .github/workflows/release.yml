name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --production

      - name: Build package
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mkdir -p dist-pkg

          # Bundle JS (non-compiled — keeps native module loading working)
          bun build src/index.ts --outdir dist-pkg --target bun --external sharp

          # Copy sharp native bindings
          mkdir -p dist-pkg/node_modules
          cp -r node_modules/sharp dist-pkg/node_modules/
          cp -r node_modules/@img dist-pkg/node_modules/
          cp -r node_modules/color dist-pkg/node_modules/
          cp -r node_modules/color-convert dist-pkg/node_modules/
          cp -r node_modules/color-name dist-pkg/node_modules/
          cp -r node_modules/color-string dist-pkg/node_modules/
          cp -r node_modules/detect-libc dist-pkg/node_modules/
          cp -r node_modules/is-arrayish dist-pkg/node_modules/
          cp -r node_modules/semver dist-pkg/node_modules/
          cp -r node_modules/simple-swizzle dist-pkg/node_modules/

          # Create launcher script
          cat > dist-pkg/phosphor << 'LAUNCHER'
          #!/usr/bin/env bun
          import "./index.js";
          LAUNCHER
          chmod +x dist-pkg/phosphor

          tar -czf phosphor-${TAG}-${{ matrix.target }}.tar.gz -C dist-pkg .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phosphor-${{ matrix.target }}
          path: phosphor-v*-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            phosphor-${TAG}-*.tar.gz

  publish-npm:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build library
        run: bun run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm publish --access public

  update-tap:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}

          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "phosphor-${TAG}-darwin-arm64.tar.gz" \
            --pattern "phosphor-${TAG}-linux-x64.tar.gz"
          SHA256_DARWIN=$(shasum -a 256 phosphor-${TAG}-darwin-arm64.tar.gz | cut -d' ' -f1)
          SHA256_LINUX=$(shasum -a 256 phosphor-${TAG}-linux-x64.tar.gz | cut -d' ' -f1)

          git clone https://x-access-token:${GH_TOKEN}@github.com/alkautsarf/homebrew-tap.git tap
          cd tap

          cat > Formula/phosphor.rb << EOF
          class Phosphor < Formula
            desc "Render images in your terminal — Kitty, Sixel, iTerm2 with tmux passthrough"
            homepage "https://github.com/alkautsarf/phosphor"
            version "${VERSION}"
            depends_on "oven-sh/bun/bun"

            on_macos do
              on_arm do
                url "https://github.com/alkautsarf/phosphor/releases/download/${TAG}/phosphor-${TAG}-darwin-arm64.tar.gz"
                sha256 "${SHA256_DARWIN}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/alkautsarf/phosphor/releases/download/${TAG}/phosphor-${TAG}-linux-x64.tar.gz"
                sha256 "${SHA256_LINUX}"
              end
            end

            def install
              libexec.install Dir["*"]
              bin.write_exec_script libexec/"phosphor"
              bin.install_symlink bin/"phosphor" => "ph"
              bin.install_symlink bin/"phosphor" => "pho"
            end

            test do
              assert_predicate bin/"phosphor", :executable?
            end
          end
          EOF

          sed -i 's/^          //' Formula/phosphor.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/phosphor.rb
          git commit -m "chore: bump phosphor to ${VERSION}"
          git push
